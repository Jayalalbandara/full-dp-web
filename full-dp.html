<!DOCTYPE html>
<html>
<head>
    <title>Full DP Uploader</title>
    <style>
        body { font-family: sans-serif; background: #020b1c; color: white; text-align: center; padding: 50px; }
        .box { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 15px; display: inline-block; }
        input { margin: 10px; padding: 10px; width: 80%; border-radius: 5px; }
        button { background: #2196f3; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>WhatsApp Full DP Uploader</h2>
        <form action="/upload-dp" method="POST" enctype="multipart/form-data">
            <input type="text" name="number" placeholder="9477xxxxxxx" required><br>
            <input type="file" name="image" accept="image/*" required><br>
            <button type="submit">Update Profile Picture</button>
        </form>
    </div>
</body>
</html>
